name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # macos-26 image: builds link against the macOS 26 SDK so the app gets
    # the current system appearance (Liquid Glass) instead of compatibility mode.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Test
        run: swift test
